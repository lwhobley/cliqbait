openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Luxury Fashion Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: cart
    description: Cart and checkout operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      description: Returns all synced products from Printful, cached in DB
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/category/{slug}:
    get:
      operationId: getProductsByCategory
      tags: [products]
      summary: Get products by category
      description: Returns products filtered by category slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of products in category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get single product
      description: Returns a single product with all variants and real-time pricing
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout/session:
    post:
      operationId: createCheckoutSession
      tags: [cart]
      summary: Create Stripe checkout session
      description: Creates a Stripe Checkout Session for the cart items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionBody"
      responses:
        "200":
          description: Stripe checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhook:
    post:
      operationId: stripeWebhook
      tags: [orders]
      summary: Stripe webhook handler
      description: Handles Stripe webhook events for order fulfillment
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"

  /orders/{sessionId}:
    get:
      operationId: getOrderBySession
      tags: [orders]
      summary: Get order by Stripe session ID
      description: Returns order details for a completed Stripe session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        colorCode:
          type: ["string", "null"]
        price:
          type: string
        inStock:
          type: boolean
      required:
        - id
        - name
        - price
        - inStock

    Product:
      type: object
      properties:
        id:
          type: integer
        printfulId:
          type: ["integer", "null"]
        name:
          type: string
        category:
          type: string
        basePrice:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        additionalImages:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - category
        - basePrice
        - imageUrl

    ProductDetail:
      type: object
      properties:
        id:
          type: integer
        printfulId:
          type: ["integer", "null"]
        name:
          type: string
        category:
          type: string
        basePrice:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        additionalImages:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        relatedProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - id
        - name
        - category
        - basePrice
        - imageUrl
        - variants
        - relatedProducts

    CartItem:
      type: object
      properties:
        productId:
          type: integer
        variantId:
          type: integer
        name:
          type: string
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        price:
          type: string
        quantity:
          type: integer
        imageUrl:
          type: string
      required:
        - productId
        - variantId
        - name
        - price
        - quantity
        - imageUrl

    CreateCheckoutSessionBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        successUrl:
          type: string
        cancelUrl:
          type: string
      required:
        - items
        - successUrl
        - cancelUrl

    CheckoutSessionResponse:
      type: object
      properties:
        url:
          type: string
        sessionId:
          type: string
      required:
        - url
        - sessionId

    WebhookResponse:
      type: object
      properties:
        received:
          type: boolean
      required:
        - received

    Order:
      type: object
      properties:
        id:
          type: integer
        stripeSessionId:
          type: string
        printfulOrderId:
          type: ["string", "null"]
        customerEmail:
          type: ["string", "null"]
        status:
          type: string
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - stripeSessionId
        - status
        - lineItems
        - createdAt
